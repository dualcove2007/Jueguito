<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RUNNER - Cyberpunk Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="touchControls">
            <div id="touchDpad">
                <button id="tbLeft" class="tb">◄</button>
                <button id="tbRight" class="tb">►</button>
                <button id="tbDown" class="tb">▼</button>
            </div>
            <div id="touchActions">
                <button id="tbShoot" class="tb tb-action">⚡</button>
                <button id="tbJump" class="tb tb-action">▲</button>
            </div>
            <button id="tbPause" class="tb tb-pause">II</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
